<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Unggah Dokumen</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --text-dark: #111827;
            --text-light: #6b7280;
            --bg-body: #f8fafc;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-body); color: var(--text-dark); margin: 0; padding: 40px 20px; line-height: 1.5; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        
        h2 { margin-top: 0; border-bottom: 2px solid var(--gray-200); padding-bottom: 16px; color: var(--text-dark); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: var(--text-dark); }
        
        input[type="text"], select, input[type="file"] { 
            width: 100%; 
            padding: 12px 14px; 
            border: 1px solid #d1d5db; 
            border-radius: 6px; 
            font-size: 0.95rem; 
            outline: none; 
            box-sizing: border-box;
            transition: border-color 0.2s; 
        }
        input[type="text"]:focus, select:focus, input[type="file"]:focus { border-color: var(--primary); }
        
        /* Modifikasi input file agar terlihat lebih rapi */
        input[type="file"] { background-color: var(--gray-100); cursor: pointer; }
        
        button { 
            width: 100%; 
            cursor: pointer; 
            padding: 14px; 
            border: none; 
            border-radius: 6px; 
            font-weight: 600; 
            font-size: 1rem;
            background-color: var(--primary); 
            color: white; 
            transition: background-color 0.2s; 
            margin-top: 10px;
        }
        button:hover { background-color: var(--primary-hover); }

        .nav-link { display: inline-block; margin-top: 20px; color: var(--text-light); text-decoration: none; font-size: 0.9rem; }
        .nav-link:hover { color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel Admin - Unggah Dokumen Baru</h2>
    
    <!-- 
      Atribut action="/api/upload" menargetkan endpoint Node.js.
      Atribut enctype="multipart/form-data" WAJIB ada untuk pengiriman file fisik.
    -->
    <form action="/api/upload" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label for="docName">Nama Dokumen</label>
            <input type="text" id="docName" name="docName" placeholder="Contoh: SK Mutasi Tahun 2026" required>
        </div>

        <div class="form-group">
            <label for="categoryId">Kategori Dokumen</label>
            <select id="categoryId" name="categoryId" required>
                <option value="">Memuat data kategori...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="document">Pilih File (PDF, DOCX, dll)</label>
            <input type="file" id="document" name="document" required>
        </div>

        <button type="submit">Unggah Dokumen</button>
    </form>

    <a href="/index.html" class="nav-link">← Lihat Katalog Publik (index.html)</a>
</div>

<script>
    // Logika untuk mengisi opsi kategori secara dinamis dari data.json
    document.addEventListener('DOMContentLoaded', () => {
        fetch('/data.json')
            .then(response => {
                if (!response.ok) throw new Error('Gagal memuat data.json');
                return response.json();
            })
            .then(data => {
                const selectElement = document.getElementById('categoryId');
                selectElement.innerHTML = '<option value="">-- Pilih Kategori --</option>'; // Reset
                
                // Looping data kategori dan masukkan ke dropdown form
                data.categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat.id; // Ini yang akan dikirim ke server (req.body.categoryId)
                    option.textContent = cat.name;
                    selectElement.appendChild(option);
                });
            })
            .catch(error => {
                console.error('Error fetching categories:', error);
                document.getElementById('categoryId').innerHTML = '<option value="">Gagal memuat kategori. Pastikan server lokal berjalan.</option>';
            });
    });
</script>

</body>
</html>
