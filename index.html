<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Katalog Informasi & Dokumen</title>
    <style>
        /* Desain Sistem Variabel Modern (Sleek & Clean) */
        :root {
            --bg-app: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-ghost: #94a3b8;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --info-light: #f0f5ff;
            --info-text: #1d4ed8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 1240px; 
            margin: 0 auto; 
            background: var(--surface); 
            padding: 20px; 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        @media (min-width: 640px) { body { padding: 32px 24px; } .container { padding: 40px; } }

        .hidden { display: none !important; }
        
        /* HEADER & SECTION CONTROLS */
        .header-section { margin-bottom: 24px; }
        @media (min-width: 640px) { .header-section { margin-bottom: 32px; } }
        
        .header-section h2 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            color: var(--text-main);
            margin-bottom: 16px;
        }
        @media (min-width: 640px) { .header-section h2 { font-size: 1.75rem; margin-bottom: 24px; } }

        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        @media (min-width: 768px) { 
            .controls-wrapper { flex-direction: row; justify-content: space-between; align-items: center; padding: 16px 24px; } 
        }

        .search-container { position: relative; width: 100%; }
        @media (min-width: 768px) { .search-container { max-width: 400px; } }
        
        input[type="text"], select { 
            width: 100%;
            padding: 10px 16px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius-md); 
            font-size: 0.925rem; 
            color: var(--text-main);
            background-color: var(--surface);
            outline: none; 
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        input[type="text"]:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .sort-container { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; width: 100%; }
        @media (min-width: 480px) { .sort-container { flex-direction: row; align-items: center; gap: 12px; } }
        @media (min-width: 768px) { .sort-container { width: auto; } }
        
        .sort-label { font-size: 0.875rem; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
        .sort-container select { width: 100%; }
        @media (min-width: 480px) { .sort-container select { min-width: 200px; } }

        /* BUTTON SYSTEM */
        button { 
            cursor: pointer; 
            padding: 10px 20px; 
            border: none; 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: all 0.2s ease; 
            white-space: nowrap;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-back { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }
        @media (min-width: 480px) { .btn-back { width: auto; justify-content: start; margin-bottom: 24px; } }
        .btn-back:hover { background-color: #f1f5f9; color: var(--text-main); border-color: var(--border-hover); }
        
        .btn-nav { background-color: var(--surface); color: var(--text-muted); border: 1px solid var(--border); box-shadow: var(--shadow-sm); width: 100%; text-align: center; }
        @media (min-width: 480px) { .btn-nav { width: auto; } }
        .btn-nav:hover:not(:disabled) { background-color: #f1f5f9; color: var(--text-main); border-color: var(--border-hover); }

        .btn-preview { 
            background-color: var(--info-light); 
            color: var(--info-text); 
            padding: 8px 16px; 
            font-size: 0.85rem; 
            font-weight: 600;
            width: 100%;
        }
        @media (min-width: 640px) { .btn-preview { width: auto; } }
        .btn-preview:hover { background-color: var(--primary); color: white; }

        /* ACCORDION */
        .acc-group { border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 10px; overflow: hidden; }
        .acc-header { display: flex; align-items: center; gap: 10px; padding: 13px 20px; background: #f8fafc; cursor: pointer; user-select: none; transition: background 0.15s; }
        .acc-header:hover { background: #f1f5f9; }
        .acc-title { font-weight: 700; font-size: 0.95rem; flex: 1; color: var(--text-main); }
        .acc-badge { background: #dbeafe; color: #1d4ed8; font-size: 0.75rem; font-weight: 600; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
        .acc-arrow { font-size: 0.7rem; color: var(--text-ghost); transition: transform 0.2s; display: inline-block; }
        .acc-group.open .acc-arrow { transform: rotate(180deg); }
        .acc-body { display: none; }
        .acc-group.open .acc-body { display: block; }

        /* TABLE */
        .table-responsive { overflow-x: auto; background: var(--surface); }
        table { width: 100%; border-collapse: collapse; text-align: left; table-layout: fixed; }
        th, td { padding: 13px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        th { background-color: #f8fafc; font-weight: 600; font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f9fafb; }
        td { font-size: 0.9rem; color: var(--text-main); line-height: 1.4; }

        .col-doc-name { width: 52%; font-weight: 500; word-break: break-word; }
        .col-doc-size { width: 15%; white-space: nowrap; }
        .col-doc-date { width: 15%; white-space: nowrap; color: var(--text-muted); font-size: 0.875rem; }
        .col-doc-act  { width: 18%; text-align: right; white-space: nowrap; }

        .result-info { color: var(--text-muted); font-size: 0.875rem; margin-top: 16px; text-align: center; }

        /* ===== MOBILE RESPONSIVE (dikendalikan via JS ResizeObserver) ===== */
        /* Gunakan body.is-mobile agar bekerja di dalam iframe WYSIWYG */
        body.is-mobile { padding: 10px; }
        body.is-mobile .container { padding: 14px; border-radius: 10px; }
        body.is-mobile .header-section { margin-bottom: 16px; }
        body.is-mobile .header-section h2 { font-size: 1.2rem; margin-bottom: 12px; }
        body.is-mobile .controls-wrapper { padding: 12px; gap: 10px; flex-direction: column; }
        body.is-mobile .search-container { max-width: 100%; }
        body.is-mobile .sort-container { width: 100%; }
        body.is-mobile .acc-header { padding: 11px 14px; }
        body.is-mobile .acc-title { font-size: 0.88rem; }
        body.is-mobile .btn-back { margin-bottom: 14px; font-size: 0.85rem; width: 100%; justify-content: center; }
        body.is-mobile .btn-preview { width: 100%; }
        body.is-mobile .btn-nav { width: 100%; text-align: center; }

        /* Tabel accordion → stacked block */
        body.is-mobile .acc-body table,
        body.is-mobile #detail-view .table-responsive table { display: block; }
        body.is-mobile .acc-body thead,
        body.is-mobile #detail-view .table-responsive thead { display: none; }
        body.is-mobile .acc-body tbody,
        body.is-mobile #detail-view .table-responsive tbody { display: block; }
        body.is-mobile .acc-body tbody tr,
        body.is-mobile #detail-view .table-responsive tbody tr {
            display: block;
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }
        body.is-mobile .acc-body tbody tr:last-child,
        body.is-mobile #detail-view .table-responsive tbody tr:last-child { border-bottom: none; }
        body.is-mobile .acc-body tbody tr:hover td,
        body.is-mobile #detail-view .table-responsive tbody tr:hover td { background: transparent !important; }
        body.is-mobile .acc-body td,
        body.is-mobile #detail-view .table-responsive td {
            display: block;
            padding: 2px 0;
            border: none;
            width: 100% !important;
            white-space: normal;
        }
        body.is-mobile .col-doc-name { font-weight: 600; padding-bottom: 6px !important; }
        body.is-mobile .col-doc-size { font-size: 0.82rem; padding-bottom: 2px !important; }
        body.is-mobile .col-doc-date { font-size: 0.82rem; padding-bottom: 10px !important; }
        body.is-mobile .col-doc-act  { padding-top: 2px !important; }

        /* Pagination stack vertikal */
        body.is-mobile #pagination-panel,
        body.is-mobile #detail-pagination {
            flex-direction: column !important;
            align-items: stretch !important;
            gap: 8px !important;
        }
        body.is-mobile #pagination-panel #page-info,
        body.is-mobile #detail-pagination #detail-info { margin-right: 0; text-align: center; }

        /* Tetap pertahankan media query sebagai fallback untuk akses langsung */
        @media (max-width: 639px) {
            body:not(.is-mobile) { padding: 10px; }
            body:not(.is-mobile) .container { padding: 14px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" style="text-align: center; padding: 60px; color: var(--text-muted); font-weight: 500;">Sinkronisasi Basis Data Lokal...</div>

    <!-- VIEW UTAMA: ACCORDION -->
    <div id="main-view" class="hidden">
        <div class="header-section">
            <h2>Katalog Informasi Publik</h2>
            <div class="controls-wrapper">
                <div class="search-container">
                    <input type="text" id="search-input" placeholder="Cari nama dokumen..." oninput="applyFilter()">
                </div>
                <div class="sort-container">
                    <select id="filter-cat" onchange="applyFilter()">
                        <option value="">Semua Kategori</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="accordion-container"></div>

        <div id="pagination-panel" style="display:none; align-items:center; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); flex-wrap:wrap;">
            <span id="page-info" style="margin-right:auto; color:var(--text-muted); font-size:0.875rem;"></span>
            <button class="btn-nav" id="btn-prev" onclick="changePage(-1)">← Sebelumnya</button>
            <span id="page-text" style="font-size:0.875rem; font-weight:600; color:var(--text-main); background:#f1f5f9; padding:6px 12px; border-radius:6px; white-space:nowrap;"></span>
            <button class="btn-nav" id="btn-next" onclick="changePage(1)">Berikutnya →</button>
        </div>
    </div>

    <!-- VIEW DETAIL: TABEL PENUH (untuk kategori >10 dokumen) -->
    <div id="detail-view" class="hidden">
        <button class="btn-back" onclick="backToMain()">← Kembali ke Katalog</button>
        <div class="header-section">
            <h2 id="detail-title"></h2>
            <div class="controls-wrapper">
                <div class="search-container">
                    <input type="text" id="detail-search" placeholder="Cari nama dokumen..." oninput="filterDetail()">
                </div>
            </div>
        </div>
        <div class="table-responsive" style="border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-sm);">
            <table>
                <thead><tr>
                    <th class="col-doc-name">Nama Dokumen</th>
                    <th class="col-doc-size">Ukuran</th>
                    <th class="col-doc-date">Tanggal</th>
                    <th class="col-doc-act">Aksi</th>
                </tr></thead>
                <tbody id="detail-tbody"></tbody>
            </table>
        </div>
        <div id="detail-pagination" style="display:none; align-items:center; justify-content:flex-end; gap:12px; margin-top:20px; padding-top:16px; border-top:1px solid var(--border); flex-wrap:wrap;">
            <span id="detail-info" style="margin-right:auto; color:var(--text-muted); font-size:0.875rem;"></span>
            <button class="btn-nav" id="detail-prev" onclick="changeDetailPage(-1)">← Sebelumnya</button>
            <span id="detail-page-text" style="font-size:0.875rem; font-weight:600; color:var(--text-main); background:#f1f5f9; padding:6px 12px; border-radius:6px;"></span>
            <button class="btn-nav" id="detail-next" onclick="changeDetailPage(1)">Berikutnya →</button>
        </div>
    </div>
</div>

<script>
    let database = { categories: [], documents: [] };
    let openGroups = new Set();
    const PAGE_SIZE = 8; // jumlah grup kategori per halaman
    let currentPage = 1;
    let filteredGroups = []; // [{cat, docs}] setelah filter

    document.addEventListener('DOMContentLoaded', () => {
        fetch('data.json')
            .then(res => { if (!res.ok) throw new Error(); return res.json(); })
            .then(data => { database = data; init(); })
            .catch(() => { database = generateFallbackData(); init(); });
    });

    // Deteksi lebar kontainer aktual (bekerja di dalam iframe)
    function checkMobile() {
        const w = document.documentElement.clientWidth;
        document.body.classList.toggle('is-mobile', w < 640);
        // Kirim tinggi ke parent CMS agar iframe auto-resize
        if (window.parent !== window) {
            window.parent.postMessage({ iframeHeight: document.body.scrollHeight }, '*');
        }
    }
    checkMobile();
    window.addEventListener('resize', checkMobile);
    if (window.ResizeObserver) {
        new ResizeObserver(checkMobile).observe(document.documentElement);
    }

    function init() {
        const sel = document.getElementById('filter-cat');
        database.categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id; opt.textContent = c.name;
            sel.appendChild(opt);
        });
        document.getElementById('loader').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
        applyFilter();
    }

    function applyFilter() {
        currentPage = 1;
        const search = document.getElementById('search-input').value.toLowerCase().trim();
        const catFilter = document.getElementById('filter-cat').value;
        const isFiltering = !!search || !!catFilter;

        // Bangun grup: [{cat, docs}]
        filteredGroups = database.categories
            .map(cat => {
                let docs = database.documents.filter(d => d.categoryId === cat.id);
                if (search) docs = docs.filter(d => d.name.toLowerCase().includes(search));
                docs.sort((a, b) => a.name.localeCompare(b.name, 'id'));
                return { cat, docs };
            })
            .filter(g => {
                if (catFilter && g.cat.id !== catFilter) return false;
                return g.docs.length > 0;
            });

        renderPage(isFiltering);
    }

    const INLINE_LIMIT = 10; // maks dokumen tampil inline di accordion
    const DETAIL_PER_PAGE = 10;
    let detailData = { catId: '', docs: [], filtered: [], page: 1 };

    function renderPage(autoExpand) {
        const container = document.getElementById('accordion-container');

        if (filteredGroups.length === 0) {
            container.innerHTML = '<div style="text-align:center;padding:48px;color:var(--text-ghost);font-weight:500;">Tidak ada dokumen yang cocok.</div>';
            updatePagination(0);
            return;
        }

        const maxPage = Math.ceil(filteredGroups.length / PAGE_SIZE) || 1;
        if (currentPage > maxPage) currentPage = maxPage;

        const start = (currentPage - 1) * PAGE_SIZE;
        const pageGroups = autoExpand ? filteredGroups : filteredGroups.slice(start, start + PAGE_SIZE);

        container.innerHTML = '';
        pageGroups.forEach(({ cat, docs }) => {
            const isLarge = docs.length > INLINE_LIMIT;
            const isOpen = autoExpand || openGroups.has(cat.id);
            const previewDocs = isLarge ? docs.slice(0, 5) : docs;

            const group = document.createElement('div');
            group.className = 'acc-group' + (isOpen ? ' open' : '');
            group.id = `acc-${cat.id}`;

            const rowsHtml = previewDocs.map(d => `
                <tr>
                    <td class="col-doc-name">${d.name}</td>
                    <td class="col-doc-size"><span style="background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:0.82rem;font-weight:500;">${d.fileUrl ? '🔗 Tautan' : (d.size || '-')}</span></td>
                    <td class="col-doc-date">${d.date || '-'}</td>
                    <td class="col-doc-act"><button class="btn-preview" onclick="previewItem('${d.id}')">Tampilkan</button></td>
                </tr>`).join('');

            const lihatSemuaRow = isLarge ? `
                <tr>
                    <td colspan="4" style="text-align:center; padding:12px; background:#f8fafc;">
                        <button class="btn-preview" style="background:#eff6ff; color:#1d4ed8;" onclick="openDetail('${cat.id}')">
                            Lihat Semua ${docs.length} Dokumen →
                        </button>
                    </td>
                </tr>` : '';

            group.innerHTML = `
                <div class="acc-header" onclick="toggleGroup('${cat.id}')">
                    <span class="acc-title">📁 ${cat.name}</span>
                    <span class="acc-badge">${docs.length} dokumen</span>
                    <span class="acc-arrow">▼</span>
                </div>
                <div class="acc-body">
                    <div class="table-responsive" style="border-top:1px solid var(--border);">
                        <table>
                            <thead><tr>
                                <th class="col-doc-name">Nama Dokumen</th>
                                <th class="col-doc-size">Ukuran</th>
                                <th class="col-doc-date">Tanggal</th>
                                <th class="col-doc-act">Aksi</th>
                            </tr></thead>
                            <tbody>${rowsHtml}${lihatSemuaRow}</tbody>
                        </table>
                    </div>
                </div>`;
            container.appendChild(group);
        });

        updatePagination(autoExpand ? 0 : filteredGroups.length);
    }

    function updatePagination(total) {
        const panel = document.getElementById('pagination-panel');
        if (total <= PAGE_SIZE) { panel.style.display = 'none'; return; }
        panel.style.display = 'flex';
        const maxPage = Math.ceil(total / PAGE_SIZE);
        document.getElementById('page-info').textContent = `${filteredGroups.length} kategori`;
        document.getElementById('page-text').textContent = `${currentPage} / ${maxPage}`;
        document.getElementById('btn-prev').disabled = currentPage === 1;
        document.getElementById('btn-next').disabled = currentPage === maxPage;
    }

    function changePage(dir) {
        const maxPage = Math.ceil(filteredGroups.length / PAGE_SIZE);
        const next = currentPage + dir;
        if (next >= 1 && next <= maxPage) { currentPage = next; renderPage(false); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }

    function toggleGroup(catId) {
        const group = document.getElementById(`acc-${catId}`);
        if (group.classList.toggle('open')) openGroups.add(catId);
        else openGroups.delete(catId);
    }

    // --- DETAIL VIEW (kategori > 10 dokumen) ---
    function openDetail(catId) {
        const cat = database.categories.find(c => c.id === catId);
        detailData.catId = catId;
        detailData.docs = database.documents.filter(d => d.categoryId === catId).sort((a, b) => a.name.localeCompare(b.name, 'id'));
        detailData.page = 1;
        document.getElementById('detail-title').textContent = cat ? cat.name : catId;
        document.getElementById('detail-search').value = '';
        filterDetail();
        document.getElementById('main-view').classList.add('hidden');
        document.getElementById('detail-view').classList.remove('hidden');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function filterDetail() {
        const q = document.getElementById('detail-search').value.toLowerCase().trim();
        detailData.filtered = q ? detailData.docs.filter(d => d.name.toLowerCase().includes(q)) : detailData.docs;
        detailData.page = 1;
        renderDetail();
    }

    function renderDetail() {
        const tbody = document.getElementById('detail-tbody');
        const { filtered, page } = detailData;
        const start = (page - 1) * DETAIL_PER_PAGE;
        const paged = filtered.slice(start, start + DETAIL_PER_PAGE);

        if (paged.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;padding:32px;color:var(--text-ghost);">Tidak ada dokumen yang cocok.</td></tr>`;
        } else {
            tbody.innerHTML = paged.map(d => `
                <tr>
                    <td class="col-doc-name">${d.name}</td>
                    <td class="col-doc-size"><span style="background:#f1f5f9;padding:3px 8px;border-radius:4px;font-size:0.82rem;font-weight:500;">${d.fileUrl ? '🔗 Tautan' : (d.size || '-')}</span></td>
                    <td class="col-doc-date">${d.date || '-'}</td>
                    <td class="col-doc-act"><button class="btn-preview" onclick="previewItem('${d.id}')">Tampilkan</button></td>
                </tr>`).join('');
        }

        const maxPage = Math.ceil(filtered.length / DETAIL_PER_PAGE) || 1;
        const panel = document.getElementById('detail-pagination');
        panel.style.display = filtered.length > DETAIL_PER_PAGE ? 'flex' : 'none';
        document.getElementById('detail-info').textContent = `${filtered.length} dokumen`;
        document.getElementById('detail-page-text').textContent = `${page} / ${maxPage}`;
        document.getElementById('detail-prev').disabled = page === 1;
        document.getElementById('detail-next').disabled = page === maxPage;
    }

    function changeDetailPage(dir) {
        const maxPage = Math.ceil(detailData.filtered.length / DETAIL_PER_PAGE);
        const next = detailData.page + dir;
        if (next >= 1 && next <= maxPage) { detailData.page = next; renderDetail(); window.scrollTo({ top: 0, behavior: 'smooth' }); }
    }

    function backToMain() {
        document.getElementById('detail-view').classList.add('hidden');
        document.getElementById('main-view').classList.remove('hidden');
    }

    function previewItem(id) {
        const doc = database.documents.find(d => d.id === id);
        const target = doc && (doc.fileUrl || doc.filePath);
        if (target) window.open(target, '_blank');
        else alert(`Berkas untuk ID: ${id} tidak ditemukan.`);
    }

    function generateFallbackData() {
        const fallback = { categories: [], documents: [] };
        const names = ['Regulasi', 'Laporan Keuangan', 'Aset & Inventaris', 'SOP Operasional', 'Dokumen Pengadaan', 'Audit Internal'];
        names.forEach((name, i) => {
            const id = `C${String(i+1).padStart(2,'0')}`;
            fallback.categories.push({ id, name, desc: `Arsip divisi ${name}.`, date: `2026-05-${10+i}` });
            for (let j = 1; j <= 3; j++) {
                fallback.documents.push({ id: `DOC-${id}-${j}`, categoryId: id, name: `Berkas ${name} Bagian ${j}`, size: `${(Math.random()*2+1).toFixed(1)} MB`, filePath: `uploads/sample.pdf` });
            }
        });
        return fallback;
    }
</script>
