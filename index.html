<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Katalog Informasi & Dokumen</title>
    <style>
        /* Desain Sistem Variabel Modern (Sleek & Clean) */
        :root {
            --bg-app: #f8fafc;
            --surface: #ffffff;
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --primary-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-muted: #475569;
            --text-ghost: #94a3b8;
            --border: #e2e8f0;
            --border-hover: #cbd5e1;
            --info-light: #f0f5ff;
            --info-text: #1d4ed8;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.04), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
            --radius-md: 10px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background-color: var(--bg-app); 
            color: var(--text-main); 
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .container { 
            max-width: 1240px; 
            margin: 0 auto; 
            background: var(--surface); 
            padding: 20px; 
            border-radius: var(--radius-lg); 
            border: 1px solid var(--border);
            box-shadow: var(--shadow-md);
        }

        @media (min-width: 640px) { body { padding: 32px 24px; } .container { padding: 40px; } }

        .hidden { display: none !important; }
        
        /* HEADER & SECTION CONTROLS */
        .header-section { margin-bottom: 24px; }
        @media (min-width: 640px) { .header-section { margin-bottom: 32px; } }
        
        .header-section h2 { 
            font-size: 1.5rem; 
            font-weight: 700; 
            letter-spacing: -0.02em;
            color: var(--text-main);
            margin-bottom: 16px;
        }
        @media (min-width: 640px) { .header-section h2 { font-size: 1.75rem; margin-bottom: 24px; } }

        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: #f8fafc;
            padding: 16px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }
        @media (min-width: 768px) { 
            .controls-wrapper { flex-direction: row; justify-content: space-between; align-items: center; padding: 16px 24px; } 
        }

        .search-container { position: relative; width: 100%; }
        @media (min-width: 768px) { .search-container { max-width: 400px; } }
        
        input[type="text"], select { 
            width: 100%;
            padding: 10px 16px; 
            border: 1px solid var(--border); 
            border-radius: var(--radius-md); 
            font-size: 0.925rem; 
            color: var(--text-main);
            background-color: var(--surface);
            outline: none; 
            transition: all 0.2s ease;
            box-shadow: var(--shadow-sm);
        }
        input[type="text"]:focus, select:focus { 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .sort-container { display: flex; flex-direction: column; align-items: flex-start; gap: 8px; width: 100%; }
        @media (min-width: 480px) { .sort-container { flex-direction: row; align-items: center; gap: 12px; } }
        @media (min-width: 768px) { .sort-container { width: auto; } }
        
        .sort-label { font-size: 0.875rem; font-weight: 500; color: var(--text-muted); white-space: nowrap; }
        .sort-container select { width: 100%; }
        @media (min-width: 480px) { .sort-container select { min-width: 200px; } }

        /* BUTTON SYSTEM */
        button { 
            cursor: pointer; 
            padding: 10px 20px; 
            border: none; 
            border-radius: var(--radius-md); 
            font-weight: 600; 
            font-size: 0.9rem;
            transition: all 0.2s ease; 
            white-space: nowrap;
        }
        button:disabled { opacity: 0.4; cursor: not-allowed; }
        
        .btn-back { 
            background-color: transparent; 
            color: var(--text-muted); 
            border: 1px solid var(--border);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            justify-content: center;
        }
        @media (min-width: 480px) { .btn-back { width: auto; justify-content: start; margin-bottom: 24px; } }
        .btn-back:hover { background-color: #f1f5f9; color: var(--text-main); border-color: var(--border-hover); }
        
        .btn-nav { background-color: var(--surface); color: var(--text-muted); border: 1px solid var(--border); box-shadow: var(--shadow-sm); width: 100%; text-align: center; }
        @media (min-width: 480px) { .btn-nav { width: auto; } }
        .btn-nav:hover:not(:disabled) { background-color: #f1f5f9; color: var(--text-main); border-color: var(--border-hover); }

        .btn-preview { 
            background-color: var(--info-light); 
            color: var(--info-text); 
            padding: 8px 16px; 
            font-size: 0.85rem; 
            font-weight: 600;
            width: 100%;
        }
        @media (min-width: 640px) { .btn-preview { width: auto; } }
        .btn-preview:hover { background-color: var(--primary); color: white; }

        /* GRID KATALOG (CARDS DESIGN) */
        .card-grid { 
            display: grid; 
            grid-template-columns: 1fr; 
            gap: 16px; 
            margin-bottom: 24px;
        }
        @media (min-width: 540px) { .card-grid { grid-template-columns: repeat(2, 1fr); gap: 20px; } }
        @media (min-width: 900px) { .card-grid { grid-template-columns: repeat(3, 1fr); gap: 24px; } }
        @media (min-width: 1150px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }

        .card { 
            border: 1px solid var(--border); 
            border-radius: var(--radius-lg); 
            padding: 20px; 
            background: var(--surface); 
            cursor: pointer; 
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            position: relative;
        }
        @media (min-width: 640px) { .card { padding: 24px; } }
        .card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: #93c5fd; }
        
        .card-title { 
            font-size: 1.1rem; 
            font-weight: 600; 
            color: var(--text-main); 
            margin-bottom: 10px; 
            line-height: 1.4;
            transition: color 0.2s ease;
        }
        @media (min-width: 640px) { .card-title { font-size: 1.125rem; } }
        .card:hover .card-title { color: var(--primary); }
        
        .card-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; flex-grow: 1; line-height: 1.5; }
        
        .card-footer { 
            font-size: 0.8rem; 
            font-weight: 500;
            color: var(--text-ghost); 
            display: flex; 
            align-items: center;
            border-top: 1px solid #f1f5f9; 
            padding-top: 14px; 
        }
        .footer-item { display: flex; align-items: center; gap: 6px; }

        /* =======================================================
           FIX SINKRONISASI LEBAR: METODE HYBRID (PX & AUTO)
           ======================================================= */
        #view-table { 
            max-width: 850px; 
            margin: 0 auto;   
        }

        .table-responsive { 
            border-radius: var(--radius-md); 
            border: 1px solid var(--border); 
            box-shadow: var(--shadow-sm);
            background: var(--surface);
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            text-align: left;
            table-layout: fixed; /* Mengunci arsitektur grid secara rigid */
        }
        
        th, td { 
            padding: 16px 20px; 
            border-bottom: 1px solid var(--border); 
            vertical-align: middle;
        }
        
        th { 
            background-color: #f8fafc; 
            font-weight: 600; 
            font-size: 0.875rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer; 
            user-select: none; 
            transition: background-color 0.2s; 
        }
        th:hover { background-color: #f1f5f9; color: var(--text-main); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background-color: #f8fafc; }
        
        /* Solusi Overlapping: Mengunci lebar fisik kolom kontrol (px), 
           dan memberikan kebebasan fluid pada kolom inti nama (auto).
        */
        .col-id { width: 130px; font-family: monospace; color: var(--text-muted); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .col-name { width: auto; font-weight: 500; white-space: normal; word-break: break-word; }
        .col-size { width: 100px; white-space: nowrap; }
        .col-action { width: 120px; text-align: right; white-space: nowrap; }
        
        td { font-size: 0.95rem; color: var(--text-main); line-height: 1.4; }

        /* Wadah Khusus Mobile List Cards */
        #mobile-list-container {
            display: none;
            width: 100%;
        }

        /* =======================================================
           RESPONSIVE MOBILE VIEW (SMARTPHONE)
           ======================================================= */
        @media (max-width: 640px) {
            .table-responsive {
                display: none !important; 
            }
            #mobile-list-container {
                display: block !important; 
            }
            .mobile-doc-card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: var(--radius-lg);
                padding: 16px;
                margin-bottom: 12px;
                box-shadow: var(--shadow-sm);
            }
            .mobile-doc-id {
                font-family: monospace;
                color: var(--text-ghost);
                font-size: 0.8rem;
                font-weight: 600;
                margin-bottom: 4px;
            }
            .mobile-doc-name {
                font-weight: 600;
                font-size: 1rem;
                color: var(--text-main);
                margin-bottom: 12px;
                line-height: 1.4;
            }
            .mobile-doc-meta {
                display: flex;
                justify-content: space-between;
                align-items: center;
                border-top: 1px solid #f1f5f9;
                padding-top: 12px;
            }
        }

        /* PAGINATION PANEL */
        .pagination-panel { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 24px; 
            gap: 16px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            width: 100%;
        }
        @media (min-width: 480px) { .pagination-panel { flex-direction: row; justify-content: flex-end; gap: 16px; } }
        @media (min-width: 640px) { .pagination-panel { margin-top: 32px; gap: 20px; } }
        
        .info-count { color: var(--text-muted); font-size: 0.875rem; font-weight: 500; text-align: center; }
        @media (min-width: 480px) { .info-count { margin-right: auto; text-align: left; } }
        
        .page-indicator { font-size: 0.875rem; font-weight: 600; color: var(--text-main); background: #f1f5f9; padding: 6px 12px; border-radius: 6px; white-space: nowrap; }

        .icon { width: 16px; height: 16px; fill: currentColor; display: inline-block; vertical-align: middle; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader" style="text-align: center; padding: 60px; color: var(--text-muted); font-weight: 500;">Sinkronisasi Basis Data Lokal...</div>

    <div id="view-catalog" class="hidden">
        <div class="header-section">
            <h2>Katalog Kategori Dokumen</h2>
            <div class="controls-wrapper">
                <div class="search-container">
                    <input type="text" id="search-cat" placeholder="Cari kategori data di sini..." oninput="handleCatalogInput()">
                </div>
                <div class="sort-container">
                    <span class="sort-label">Urutan Kategori</span>
                    <select id="sort-cat" onchange="handleCatalogInput()">
                        <option value="name_asc">Nama (A - Z)</option>
                        <option value="name_desc">Nama (Z - A)</option>
                        <option value="date_desc">Modifikasi Terbaru</option>
                        <option value="date_asc">Modifikasi Terlama</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card-grid" id="card-container"></div>

        <div class="pagination-panel">
            <span id="cat-info" class="info-count"></span>
            <button class="btn-nav" id="cat-prev" onclick="changePage('catalog', -1)">← Sebelumnya</button>
            <span id="cat-page-text" class="page-indicator"></span>
            <button class="btn-nav" id="cat-next" onclick="changePage('catalog', 1)">Berikutnya →</button>
        </div>
    </div>

    <div id="view-table" class="hidden">
        <button class="btn-back" onclick="switchView('catalog')">
            <svg class="icon" viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg> Kembali ke Katalog
        </button>
        
        <div class="header-section">
            <h2 id="table-title">Daftar Dokumen</h2>
            <div class="controls-wrapper">
                <div class="search-container">
                    <input type="text" id="search-doc" placeholder="Cari nama dokumen atau ID..." oninput="handleTableInput()">
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th onclick="handleTableSort('id')" class="col-id">ID Dokumen ↕</th>
                        <th onclick="handleTableSort('name')" class="col-name">Nama Dokumen ↕</th>
                        <th onclick="handleTableSort('size')" class="col-size">Ukuran Berkas ↕</th>
                        <th style="cursor: default; background: #f8fafc; pointer-events: none;" class="col-action">Aksi</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>

        <div id="mobile-list-container"></div>

        <div class="pagination-panel">
            <span id="doc-info" class="info-count"></span>
            <button class="btn-nav" id="doc-prev" onclick="changePage('table', -1)">← Sebelumnya</button>
            <span id="doc-page-text" class="page-indicator"></span>
            <button class="btn-nav" id="doc-next" onclick="changePage('table', 1)">Berikutnya →</button>
        </div>
    </div>
</div>

<script>
    let database = { categories: [], documents: [] };

    const state = {
        catalog: { query: '', sort: 'name_asc', page: 1, perPage: 9, filtered: [] },
        table: { activeCategory: null, query: '', sortCol: 'id', sortAsc: true, page: 1, perPage: 6, dataSet: [], filtered: [] }
    };

    document.addEventListener('DOMContentLoaded', () => {
        fetch('data.json')
            .then(res => {
                if (!res.ok) throw new Error();
                return res.json();
            })
            .then(data => {
                database = data;
                document.getElementById('loader').classList.add('hidden');
                processCatalog();
                switchView('catalog');
            })
            .catch(() => {
                database = generateFallbackData(); 
                document.getElementById('loader').classList.add('hidden');
                processCatalog();
                switchView('catalog');
            });
    });

    function handleCatalogInput() {
        state.catalog.query = document.getElementById('search-cat').value.toLowerCase();
        state.catalog.sort = document.getElementById('sort-cat').value;
        state.catalog.page = 1; 
        processCatalog();
    }

    function processCatalog() {
        let result = database.categories.filter(c => 
            c.name.toLowerCase().includes(state.catalog.query) || 
            c.desc.toLowerCase().includes(state.catalog.query)
        );

        result.sort((a, b) => {
            if (state.catalog.sort === 'name_asc') return a.name.localeCompare(b.name);
            if (state.catalog.sort === 'name_desc') return b.name.localeCompare(a.name);
            if (state.catalog.sort === 'date_asc') return a.date.localeCompare(b.date);
            if (state.catalog.sort === 'date_desc') return b.date.localeCompare(a.date);
            return 0;
        });

        state.catalog.filtered = result;
        renderCatalog();
    }

    function renderCatalog() {
        const container = document.getElementById('card-container');
        container.innerHTML = '';
        
        const { page, perPage, filtered } = state.catalog;
        const start = (page - 1) * perPage;
        const pagedData = filtered.slice(start, start + perPage);

        if (pagedData.length === 0) {
            container.innerHTML = '<div style="grid-column: 1/-1; text-align:center; padding: 40px; color: var(--text-ghost); font-weight: 500;">Kategori data tidak ditemukan.</div>';
        }

        pagedData.forEach(cat => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openCategory(cat);
            card.innerHTML = `
                <div>
                    <h3 class="card-title">${cat.name}</h3>
                    <p class="card-desc">${cat.desc}</p>
                </div>
                <div class="card-footer">
                    <div class="footer-item">
                        <svg class="icon" style="color:var(--text-ghost)" viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>
                        <span>Modifikasi: ${cat.date}</span>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });

        renderPaginationPanel('cat', filtered.length, page, perPage);
    }

    function openCategory(cat) {
        document.getElementById('table-title').innerText = `Katalog Data: ${cat.name}`;
        state.table.activeCategory = cat.id;
        state.table.dataSet = database.documents.filter(d => d.categoryId === cat.id);
        
        document.getElementById('search-doc').value = '';
        state.table.query = '';
        state.table.sortCol = 'id';
        state.table.sortAsc = true;
        state.table.page = 1;

        processTable();
        switchView('table');
    }

    function handleTableInput() {
        state.table.query = document.getElementById('search-doc').value.toLowerCase();
        state.table.page = 1;
        processTable();
    }

    function handleTableSort(column) {
        if (state.table.sortCol === column) {
            state.table.sortAsc = !state.table.sortAsc;
        } else {
            state.table.sortCol = column;
            state.table.sortAsc = true;
        }
        processTable();
    }

    function processTable() {
        let result = state.table.dataSet.filter(d => 
            d.id.toLowerCase().includes(state.table.query) || 
            d.name.toLowerCase().includes(state.table.query)
        );

        result.sort((a, b) => {
            let valA = a[state.table.sortCol];
            let valB = b[state.table.sortCol];
            if (valA < valB) return state.table.sortAsc ? -1 : 1;
            if (valA > valB) return state.table.sortAsc ? 1 : -1;
            return 0;
        });

        state.table.filtered = result;
        renderTable();
    }

    function renderTable() {
        const tbody = document.getElementById('table-body');
        const mobileContainer = document.getElementById('mobile-list-container');
        
        tbody.innerHTML = '';
        mobileContainer.innerHTML = '';

        const { page, perPage, filtered } = state.table;
        const start = (page - 1) * perPage;
        const pagedData = filtered.slice(start, start + perPage);

        if (pagedData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="4" style="text-align:center; padding: 32px; color: var(--text-ghost);">Tidak ada dokumen dalam kategori ini.</td></tr>`;
            mobileContainer.innerHTML = `<div style="text-align:center; padding: 32px; color: var(--text-ghost);">Tidak ada dokumen dalam kategori ini.</div>`;
            renderPaginationPanel('doc', 0, page, perPage);
            return;
        }

        pagedData.forEach(doc => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-id">${doc.id}</td>
                <td class="col-name" title="${doc.name}">${doc.name}</td>
                <td class="col-size"><span style="background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 0.85rem; font-weight: 500;">${doc.size}</span></td>
                <td class="col-action">
                    <button class="btn-preview" onclick="previewItem('${doc.id}')">Tampilkan</button>
                </td>
            `;
            tbody.appendChild(tr);

            const mobileCard = document.createElement('div');
            mobileCard.className = 'mobile-doc-card';
            mobileCard.innerHTML = `
                <div class="mobile-doc-id">${doc.id}</div>
                <div class="mobile-doc-name">${doc.name}</div>
                <div class="mobile-doc-meta">
                    <span style="background: #f1f5f9; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 500; color: var(--text-muted);">${doc.size}</span>
                    <button class="btn-preview" onclick="previewItem('${doc.id}')">Tampilkan</button>
                </div>
            `;
            mobileContainer.appendChild(mobileCard);
        });

        renderPaginationPanel('doc', filtered.length, page, perPage);
    }

    function switchView(view) {
        document.getElementById('view-catalog').classList.toggle('hidden', view !== 'catalog');
        document.getElementById('view-table').classList.toggle('hidden', view !== 'table');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function changePage(context, dir) {
        const s = state[context];
        const maxPage = Math.ceil(s.filtered.length / s.perPage) || 1;
        const newPage = s.page + dir;

        if (newPage >= 1 && newPage <= maxPage) {
            s.page = newPage;
            if (context === 'catalog') processCatalog();
            else processTable();
        }
    }

    function renderPaginationPanel(prefix, totalItems, currentPage, perPage) {
        const maxPage = Math.ceil(totalItems / perPage) || 1;
        document.getElementById(`${prefix}-info`).innerText = `Total: ${totalItems} baris data`;
        document.getElementById(`${prefix}-page-text`).innerText = `${currentPage} / ${maxPage}`;
        document.getElementById(`${prefix}-prev`).disabled = currentPage === 1;
        document.getElementById(`${prefix}-next`).disabled = currentPage === maxPage;
    }

    function previewItem(id) {
        const doc = database.documents.find(d => d.id === id);
        const target = doc && (doc.fileUrl || doc.filePath);
        if (target) {
            window.open(target, '_blank');
        } else {
            alert(`Berkas untuk ID: ${id} tidak ditemukan.`);
        }
    }

    function generateFallbackData() {
        const fallback = { categories: [], documents: [] };
        const mockupNames = ['Regulasi', 'Laporan Keuangan', 'Aset & Inventaris', 'SOP Operasional', 'Dokumen Pengadaan', 'Audit Internal'];
        mockupNames.forEach((name, i) => {
            const id = `C${String(i+1).padStart(2,'0')}`;
            fallback.categories.push({ id, name, desc: `Dokumen rekam log arsip untuk divisi ${name} internal.`, date: `2026-05-${10+i}` });
            for(let j=1; j<=4; j++) {
                fallback.documents.push({ id: `DOC-${id}-${j}`, categoryId: id, name: `Berkas Utama ${name} Bagian ${j}`, size: `${(Math.random()*2+1).toFixed(1)} MB`, filePath: `uploads/sample.pdf` });
            }
        });
        return fallback;
    }
</script>
</body>
</html>
